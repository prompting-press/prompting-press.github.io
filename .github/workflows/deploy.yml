name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # actions/deploy-pages hard-caps its poll timeout at 600000ms (10 min) — a
      # larger `timeout:` is silently clamped. So there is no knob to wait out a
      # slow Pages backend: when it is backlogged and the deployment sits in
      # `deployment_queued` past 10 min, this step times out. That backlog is
      # transient and clears on a second attempt, so the first attempt uses
      # continue-on-error and the retry step below re-runs it once. Without
      # continue-on-error a first-attempt timeout would fail the whole job even
      # if the retry then succeeded.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy once on transient timeout
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      # If the first attempt succeeded, this is a no-op. If both attempts failed,
      # dump the real deployment statuses + Pages config so the failure is
      # diagnosable — actions/deploy-pages otherwise only logs the polled
      # "deployment_queued" state and "Timeout reached, aborting!" with no reason.
      - name: Log deploy failure detail
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::group::Latest github-pages deployment + statuses"
          DEP_ID=$(gh api "repos/${GITHUB_REPOSITORY}/deployments?environment=github-pages&per_page=1" \
            --jq '.[0].id')
          echo "deployment id: ${DEP_ID}"
          gh api "repos/${GITHUB_REPOSITORY}/deployments/${DEP_ID}/statuses" \
            --jq '.[] | "\(.created_at)  \(.state)  \(.description // "(no description)")"'
          echo "::endgroup::"
          echo "::group::Pages configuration"
          gh api "repos/${GITHUB_REPOSITORY}/pages" \
            --jq '{status, build_type, source, https_enforced}'
          echo "::endgroup::"
